workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: default
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yourcompany.mobileerpapp # Update this with your bundle ID
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          flutter packages pub get
      - name: CocoaPods Install
        script: |
          cd frontend/ios
          pod install
      - name: Flutter build ipa and upload to TestFlight
        script: |
          cd frontend
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --build-name=1.0.0 \
            --build-number=1
    artifacts:
      - frontend/build/ios/ipa/*.ipa
      - frontend/build/ios/xcarchive/*.xcarchive
    publishing:
      # Automatically uploads to App Store Connect/Testflight if signing and connect integration is configured in Codemagic UI.
      app_store_connect:
        auth: integration
        submit_to_testflight: true
